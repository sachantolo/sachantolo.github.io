<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Me - Sacha Ntolo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
      color: #333;
      line-height: 1.6;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .page {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      padding: 60px 40px;
      position: relative;
    }

    article {
      position: relative;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 30px;
      color: #1a1a1a;
      font-weight: 700;
      line-height: 1.2;
      border-bottom: 3px solid #007acc;
      padding-bottom: 15px;
    }

    p {
      margin-bottom: 20px;
      font-size: 1.1rem;
      color: #555;
      text-align: justify;
    }

    p:last-child {
      margin-bottom: 0;
    }

    .nav-link {
      display: inline-block;
      margin-bottom: 30px;
      padding: 10px 20px;
      background: #007acc;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 500;
      transition: background 0.3s ease;
    }

    .nav-link:hover {
      background: #005a9e;
    }

    .posts-menu {
      margin-bottom: 30px;
      padding: 16px;
      border: 1px solid #e3e3e3;
      border-radius: 8px;
      background: #fafafa;
    }

    .posts-menu-title {
      font-size: 1.05rem;
      margin-bottom: 10px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .post-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .post-link {
      text-decoration: none;
      color: #005a9e;
      background: #f0f7ff;
      padding: 8px 12px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .post-link.active {
      background: #007acc;
      color: #fff;
    }

    .form-group {
      margin-bottom: 25px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
      font-size: 1rem;
    }

    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      padding: 12px 15px;
      font-family: inherit;
      font-size: 1rem;
      border: 2px solid #ddd;
      border-radius: 6px;
      transition: border-color 0.3s ease;
      color: #333;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    textarea:focus {
      outline: none;
      border-color: #007acc;
      box-shadow: 0 0 0 3px rgba(0, 122, 204, 0.1);
    }

    textarea {
      resize: vertical;
      min-height: 150px;
    }

    .submit-btn {
      background: #007acc;
      color: white;
      padding: 12px 30px;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .submit-btn:hover {
      background: #005a9e;
    }

    .submit-btn:active {
      transform: scale(0.98);
    }

    .watermark {
      margin-top: 50px;
      padding-top: 30px;
      border-top: 1px solid #ddd;
      font-size: 0.95rem;
      color: #999;
      text-align: right;
      font-style: italic;
      letter-spacing: 1px;
    }

    @media (max-width: 640px) {
      .page {
        padding: 30px 20px;
      }

      h1 {
        font-size: 1.8rem;
      }

      p {
        font-size: 1rem;
      }

      input[type="text"],
      input[type="email"],
      textarea {
        font-size: 16px;
      }

      .post-link {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div style="display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap;">
      <a href="index.html" class="nav-link">Back to Blog</a>
      <a href="about.html" class="nav-link">ℹ️ About Me</a>
    </div>

    <h1>Contact Me</h1>

    <form id="contactForm">
      <div class="form-group">
        <label for="name">Name</label>
        <input
          type="text"
          id="name"
          name="name"
          required
          placeholder="Your name"
        />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          required
          placeholder="your@email.com"
        />
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea
          id="message"
          name="message"
          required
          placeholder="Your message here..."
        ></textarea>
      </div>

      <button type="submit" class="submit-btn">Send Message</button>
    </form>

    <script>
      document.getElementById('contactForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const message = document.getElementById('message').value;

        // Create mailto link
        const mailtoLink = `mailto:martoxiss@gmail.com?subject=Contact%20from%20${encodeURIComponent(name)}&body=${encodeURIComponent(`Name: ${name}\nEmail: ${email}\n\n${message}`)}`;

        // Open email client
        window.location.href = mailtoLink;

        // Reset form
        this.reset();
      });
    </script>
  </div>
</body>
</html>
